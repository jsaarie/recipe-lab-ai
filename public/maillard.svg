<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900" viewBox="0 0 900 900" fill="none">
  <!-- Aldose sugar (open-chain glucose) — top-left -->
  <g opacity="0.45" stroke="#a6bda0" fill="none">
    <path d="M130 100 L160 135 L130 170 L160 205 L130 240 L160 275" stroke-width="1.4"/>
    <line x1="130" y1="100" x2="95" y2="80" stroke-width="1.4"/>
    <line x1="128" y1="97" x2="97" y2="79" stroke-width="1.4"/>
    <line x1="160" y1="135" x2="195" y2="130" stroke-width="1.1"/>
    <line x1="130" y1="170" x2="95" y2="165" stroke-width="1.1"/>
    <line x1="160" y1="205" x2="195" y2="200" stroke-width="1.1"/>
    <line x1="130" y1="240" x2="95" y2="235" stroke-width="1.1"/>
    <line x1="160" y1="275" x2="195" y2="270" stroke-width="1.1"/>
  </g>
  <g fill="#a6bda0" font-family="Georgia,serif" opacity="0.42">
    <text x="78" y="78" font-size="13">O</text>
    <text x="197" y="136" font-size="11">OH</text>
    <text x="70" y="171" font-size="11">OH</text>
    <text x="197" y="206" font-size="11">OH</text>
    <text x="70" y="241" font-size="11">OH</text>
    <text x="197" y="276" font-size="11">OH</text>
    <text x="120" y="296" font-size="10" opacity="0.7">R</text>
  </g>

  <!-- Amino acid — top-right -->
  <g opacity="0.42" stroke="#a6bda0" fill="none">
    <circle cx="710" cy="150" r="2.5" fill="#a6bda0"/>
    <line x1="710" y1="150" x2="710" y2="110" stroke-width="1.4"/>
    <line x1="710" y1="150" x2="760" y2="150" stroke-width="1.4"/>
    <line x1="760" y1="150" x2="785" y2="125" stroke-width="1.3"/>
    <line x1="763" y1="150" x2="788" y2="127" stroke-width="1.3"/>
    <line x1="760" y1="150" x2="785" y2="178" stroke-width="1.2"/>
    <line x1="710" y1="150" x2="670" y2="185" stroke-width="1.3"/>
  </g>
  <g fill="#a6bda0" font-family="Georgia,serif" opacity="0.4">
    <text x="694" y="105" font-size="13">NH</text>
    <text x="718" y="101" font-size="9">2</text>
    <text x="788" y="123" font-size="13">O</text>
    <text x="788" y="185" font-size="11">OH</text>
    <text x="656" y="198" font-size="13">Z</text>
  </g>

  <!-- Plus sign -->
  <g opacity="0.3" stroke="#a6bda0" stroke-width="1.5">
    <line x1="410" y1="155" x2="430" y2="155"/>
    <line x1="420" y1="145" x2="420" y2="165"/>
  </g>

  <!-- Downward arrow with H2O -->
  <g opacity="0.32" stroke="#a6bda0" fill="none">
    <line x1="450" y1="300" x2="450" y2="400" stroke-width="1.5"/>
    <path d="M444 392 L450 404 L456 392" stroke-width="1.3"/>
  </g>
  <g fill="#a6bda0" font-family="Georgia,serif" opacity="0.3">
    <text x="460" y="355" font-size="12">H</text>
    <text x="471" y="358" font-size="8">2</text>
    <text x="477" y="355" font-size="12">O</text>
  </g>

  <!-- Schiff base (imine) — bottom-left -->
  <g opacity="0.38" stroke="#a6bda0" fill="none">
    <path d="M110 540 L145 570 L110 600 L145 630 L110 660" stroke-width="1.3"/>
    <line x1="145" y1="570" x2="190" y2="555" stroke-width="1.4"/>
    <line x1="147" y1="567" x2="192" y2="552" stroke-width="1.4"/>
    <line x1="207" y1="555" x2="240" y2="575" stroke-width="1.2"/>
    <line x1="240" y1="575" x2="275" y2="560" stroke-width="1.2"/>
    <line x1="275" y1="560" x2="305" y2="540" stroke-width="1.2"/>
    <line x1="278" y1="558" x2="308" y2="538" stroke-width="1.2"/>
    <line x1="275" y1="560" x2="305" y2="585" stroke-width="1.1"/>
    <line x1="110" y1="600" x2="75" y2="595" stroke-width="1"/>
    <line x1="145" y1="630" x2="178" y2="625" stroke-width="1"/>
    <line x1="110" y1="533" x2="110" y2="540" stroke-width="1"/>
  </g>
  <g fill="#a6bda0" font-family="Georgia,serif" opacity="0.36">
    <text x="194" y="557" font-size="13">N</text>
    <text x="308" y="536" font-size="11">O</text>
    <text x="308" y="593" font-size="10">OH</text>
    <text x="52" y="601" font-size="10">OH</text>
    <text x="180" y="631" font-size="10">OH</text>
    <text x="100" y="530" font-size="11" opacity="0.7">R</text>
    <text x="232" y="592" font-size="11" opacity="0.7">Z</text>
  </g>

  <!-- Amadori product — bottom-right -->
  <g opacity="0.35" stroke="#a6bda0" fill="none">
    <path d="M640 540 L675 570 L640 600 L675 630 L640 660 L675 690" stroke-width="1.3"/>
    <line x1="675" y1="570" x2="715" y2="560" stroke-width="1.4"/>
    <line x1="677" y1="567" x2="717" y2="557" stroke-width="1.4"/>
    <line x1="640" y1="540" x2="605" y2="525" stroke-width="1.3"/>
    <line x1="640" y1="600" x2="605" y2="595" stroke-width="1"/>
    <line x1="675" y1="630" x2="710" y2="625" stroke-width="1"/>
    <line x1="640" y1="660" x2="605" y2="655" stroke-width="1"/>
  </g>
  <g fill="#a6bda0" font-family="Georgia,serif" opacity="0.33">
    <text x="718" y="562" font-size="13">O</text>
    <text x="582" y="522" font-size="12">NH</text>
    <text x="580" y="601" font-size="10">OH</text>
    <text x="712" y="631" font-size="10">OH</text>
    <text x="580" y="661" font-size="10">OH</text>
    <text x="665" y="710" font-size="11" opacity="0.7">R</text>
  </g>

  <!-- Equilibrium arrows between bottom molecules -->
  <g opacity="0.28" stroke="#a6bda0" fill="none">
    <line x1="380" y1="600" x2="530" y2="600" stroke-width="1.3"/>
    <path d="M522 596 L534 600 L522 604" stroke-width="1.2"/>
    <line x1="530" y1="612" x2="380" y2="612" stroke-width="1.3"/>
    <path d="M388 608 L376 612 L388 616" stroke-width="1.2"/>
  </g>

  <!-- Scattered fragments -->
  <g opacity="0.22" stroke="#a6bda0">
    <line x1="820" y1="80" x2="845" y2="70" stroke-width="1"/>
  </g>
  <text x="848" y="74" font-size="10" fill="#a6bda0" font-family="Georgia,serif" opacity="0.22">OH</text>

  <g opacity="0.2" stroke="#a6bda0">
    <line x1="25" y1="420" x2="55" y2="405" stroke-width="1.1"/>
    <line x1="28" y1="418" x2="58" y2="403" stroke-width="1.1"/>
  </g>
  <text x="58" y="402" font-size="11" fill="#a6bda0" font-family="Georgia,serif" opacity="0.2">O</text>

  <g opacity="0.2" stroke="#a6bda0">
    <line x1="850" y1="450" x2="875" y2="435" stroke-width="1.1"/>
  </g>
  <text x="878" y="438" font-size="11" fill="#a6bda0" font-family="Georgia,serif" opacity="0.2">NH</text>

  <g fill="#a6bda0" font-family="Georgia,serif" opacity="0.18">
    <text x="430" y="830" font-size="12">H</text>
    <text x="441" y="833" font-size="8">2</text>
    <text x="448" y="830" font-size="12">O</text>
  </g>

  <g opacity="0.2" stroke="#a6bda0" fill="none">
    <line x1="330" y1="70" x2="360" y2="55" stroke-width="1"/>
    <circle cx="330" cy="70" r="3" stroke-width="1.2"/>
    <circle cx="360" cy="55" r="3.5" stroke-width="1.2"/>
  </g>

  <g opacity="0.18" stroke="#a6bda0" fill="none">
    <line x1="780" y1="780" x2="810" y2="765" stroke-width="1"/>
    <circle cx="780" cy="780" r="3" stroke-width="1.2"/>
    <circle cx="810" cy="765" r="2.5" stroke-width="1.2"/>
  </g>
</svg>
