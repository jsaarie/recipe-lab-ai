<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="800" height="700">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8faa89" opacity="0.65"/>
    </marker>
    <marker id="arr-rev" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#8faa89" opacity="0.65"/>
    </marker>
    <style>
      .atom   { font-family: Georgia, 'Times New Roman', serif; font-size: 11.5px; fill: #8faa89; opacity: 0.58; }
      .name   { font-family: Georgia, 'Times New Roman', serif; font-size: 12.5px; font-weight: bold; fill: #8faa89; opacity: 0.68; }
      .albl   { font-family: Georgia, 'Times New Roman', serif; font-size: 10.5px; fill: #8faa89; opacity: 0.55; }
      .bond   { stroke: #8faa89; stroke-width: 1.2; fill: none; opacity: 0.58; }
      .dbl    { stroke: #8faa89; stroke-width: 1.2; fill: none; opacity: 0.58; }
      .arrow  { stroke: #8faa89; stroke-width: 1.3; fill: none; opacity: 0.63; }
    </style>
  </defs>

  <!-- ================================================================ -->
  <!-- TOP ROW                                                           -->
  <!-- ASPARAGINE  (top-left)  baseline y=150                           -->
  <!-- H₂N–C(=O)–CH₂–CH(NH₂)–COOH                                     -->
  <!-- ================================================================ -->
  <text x="42"  y="150" class="atom">H₂N</text>
  <line x1="68" y1="146" x2="84"  y2="146" class="bond"/>
  <text x="84"  y="150" class="atom">C</text>
  <!-- C=O pendant -->
  <line x1="90" y1="151" x2="90" y2="163" class="dbl"/>
  <line x1="93" y1="151" x2="93" y2="163" class="dbl"/>
  <text x="86"  y="173" class="atom">O</text>
  <line x1="98" y1="146" x2="114" y2="146" class="bond"/>
  <text x="114" y="150" class="atom">CH₂</text>
  <line x1="138" y1="146" x2="154" y2="146" class="bond"/>
  <text x="154" y="150" class="atom">CH</text>
  <!-- NH₂ pendant -->
  <line x1="168" y1="151" x2="168" y2="163" class="bond"/>
  <text x="161" y="173" class="atom">NH₂</text>
  <line x1="176" y1="146" x2="192" y2="146" class="bond"/>
  <text x="192" y="150" class="atom">COOH</text>
  <!-- name -->
  <text x="132" y="122" class="name" text-anchor="middle">Asparagine</text>

  <!-- PLUS -->
  <text x="246" y="152" class="name" font-size="17">+</text>

  <!-- DICARBONYL  (top-center)  R–C(=O)–C(=O)–H -->
  <text x="275" y="150" class="atom">R</text>
  <line x1="287" y1="146" x2="302" y2="146" class="bond"/>
  <text x="302" y="150" class="atom">C</text>
  <line x1="308" y1="151" x2="308" y2="163" class="dbl"/>
  <line x1="311" y1="151" x2="311" y2="163" class="dbl"/>
  <text x="304" y="173" class="atom">O</text>
  <line x1="316" y1="146" x2="332" y2="146" class="bond"/>
  <text x="332" y="150" class="atom">C</text>
  <line x1="338" y1="151" x2="338" y2="163" class="dbl"/>
  <line x1="341" y1="151" x2="341" y2="163" class="dbl"/>
  <text x="334" y="173" class="atom">O</text>
  <line x1="346" y1="146" x2="360" y2="146" class="bond"/>
  <text x="360" y="150" class="atom">H</text>
  <text x="318" y="122" class="name" text-anchor="middle">Dicarbonyl</text>

  <!-- Reversible arrow right: – H₂O -->
  <line x1="382" y1="143" x2="432" y2="143" class="arrow" marker-end="url(#arr)"/>
  <line x1="432" y1="150" x2="382" y2="150" class="arrow" marker-end="url(#arr-rev)"/>
  <text x="407" y="135" class="albl" text-anchor="middle">– H₂O</text>

  <!-- SCHIFF BASE  (top-right) -->
  <!-- H₂N–C(=O)–CH₂–CH–N=CH–R with C=O on R -->
  <text x="448" y="150" class="atom">H₂N</text>
  <line x1="474" y1="146" x2="490" y2="146" class="bond"/>
  <text x="490" y="150" class="atom">C</text>
  <line x1="496" y1="151" x2="496" y2="163" class="dbl"/>
  <line x1="499" y1="151" x2="499" y2="163" class="dbl"/>
  <text x="492" y="173" class="atom">O</text>
  <line x1="504" y1="146" x2="520" y2="146" class="bond"/>
  <text x="520" y="150" class="atom">CH₂</text>
  <line x1="544" y1="146" x2="560" y2="146" class="bond"/>
  <text x="560" y="150" class="atom">CH</text>
  <line x1="575" y1="146" x2="591" y2="146" class="bond"/>
  <text x="591" y="150" class="atom">N</text>
  <!-- N=CH double bond -->
  <line x1="600" y1="143" x2="616" y2="143" class="dbl"/>
  <line x1="600" y1="147" x2="616" y2="147" class="dbl"/>
  <text x="616" y="150" class="atom">CH</text>
  <line x1="631" y1="146" x2="647" y2="146" class="bond"/>
  <text x="647" y="150" class="atom">R</text>
  <!-- R C=O (small pendant) -->
  <line x1="656" y1="141" x2="656" y2="130" class="dbl"/>
  <line x1="659" y1="141" x2="659" y2="130" class="dbl"/>
  <text x="650" y="126" class="atom">O</text>
  <text x="548" y="122" class="name" text-anchor="middle">Schiff base</text>

  <!-- ================================================================ -->
  <!-- RIGHT SIDE VERTICAL ARROW: – CO₂                                 -->
  <!-- ================================================================ -->
  <line x1="580" y1="188" x2="580" y2="268" class="arrow" marker-end="url(#arr)"/>
  <text x="592" y="233" class="albl">– CO₂</text>

  <!-- ================================================================ -->
  <!-- MIDDLE-RIGHT ROW  y=300                                           -->
  <!-- Second Schiff base: H₂N–C(=O)–CH₂–CH₂–N=CH–R  (C=O on R)       -->
  <!-- ================================================================ -->
  <text x="448" y="300" class="atom">H₂N</text>
  <line x1="474" y1="296" x2="490" y2="296" class="bond"/>
  <text x="490" y="300" class="atom">C</text>
  <line x1="496" y1="301" x2="496" y2="313" class="dbl"/>
  <line x1="499" y1="301" x2="499" y2="313" class="dbl"/>
  <text x="492" y="323" class="atom">O</text>
  <line x1="504" y1="296" x2="520" y2="296" class="bond"/>
  <text x="520" y="300" class="atom">CH₂</text>
  <line x1="544" y1="296" x2="560" y2="296" class="bond"/>
  <text x="560" y="300" class="atom">CH₂</text>
  <line x1="584" y1="296" x2="600" y2="296" class="bond"/>
  <text x="600" y="300" class="atom">N</text>
  <line x1="609" y1="293" x2="625" y2="293" class="dbl"/>
  <line x1="609" y1="297" x2="625" y2="297" class="dbl"/>
  <text x="625" y="300" class="atom">CH</text>
  <line x1="641" y1="296" x2="657" y2="296" class="bond"/>
  <text x="657" y="300" class="atom">R</text>
  <!-- C=O pendant on R -->
  <line x1="666" y1="290" x2="666" y2="278" class="dbl"/>
  <line x1="669" y1="290" x2="669" y2="278" class="dbl"/>
  <text x="660" y="274" class="atom">O</text>
  <text x="558" y="272" class="name" text-anchor="middle">Schiff base</text>

  <!-- Reversible arrow left: + H₂O -->
  <line x1="440" y1="293" x2="390" y2="293" class="arrow" marker-end="url(#arr)"/>
  <line x1="390" y1="300" x2="440" y2="300" class="arrow" marker-end="url(#arr-rev)"/>
  <text x="415" y="284" class="albl" text-anchor="middle">+ H₂O</text>

  <!-- ================================================================ -->
  <!-- MIDDLE-LEFT ROW  y=300                                            -->
  <!-- 3-Aminopropionamide + Dicarbonyl                                  -->
  <!-- ================================================================ -->
  <text x="120" y="272" class="name" text-anchor="middle">3-Aminopropionamide</text>
  <text x="42"  y="300" class="atom">H₂N</text>
  <line x1="68"  y1="296" x2="84"  y2="296" class="bond"/>
  <text x="84"  y="300" class="atom">C</text>
  <line x1="90" y1="301" x2="90" y2="313" class="dbl"/>
  <line x1="93" y1="301" x2="93" y2="313" class="dbl"/>
  <text x="86"  y="323" class="atom">O</text>
  <line x1="98"  y1="296" x2="114" y2="296" class="bond"/>
  <text x="114" y="300" class="atom">CH₂</text>
  <line x1="138" y1="296" x2="154" y2="296" class="bond"/>
  <text x="154" y="300" class="atom">CH₂</text>
  <line x1="178" y1="296" x2="194" y2="296" class="bond"/>
  <text x="194" y="300" class="atom">NH₂</text>

  <!-- PLUS -->
  <text x="234" y="302" class="name" font-size="17">+</text>

  <!-- Dicarbonyl (middle-left) -->
  <text x="285" y="272" class="name" text-anchor="middle">Dicarbonyl</text>
  <text x="258" y="300" class="atom">R</text>
  <line x1="270" y1="296" x2="285" y2="296" class="bond"/>
  <text x="285" y="300" class="atom">C</text>
  <line x1="291" y1="301" x2="291" y2="313" class="dbl"/>
  <line x1="294" y1="301" x2="294" y2="313" class="dbl"/>
  <text x="287" y="323" class="atom">O</text>
  <line x1="299" y1="296" x2="315" y2="296" class="bond"/>
  <text x="315" y="300" class="atom">C</text>
  <line x1="321" y1="301" x2="321" y2="313" class="dbl"/>
  <line x1="324" y1="301" x2="324" y2="313" class="dbl"/>
  <text x="317" y="323" class="atom">O</text>
  <line x1="329" y1="296" x2="343" y2="296" class="bond"/>
  <text x="343" y="300" class="atom">H</text>

  <!-- ================================================================ -->
  <!-- BOTTOM: Arrow down from 3-Aminopropionamide  – NH₃               -->
  <!-- ================================================================ -->
  <line x1="130" y1="315" x2="130" y2="395" class="arrow" marker-end="url(#arr)"/>
  <text x="142" y="360" class="albl">– NH₃</text>

  <!-- ================================================================ -->
  <!-- ACRYLAMIDE  y=430                                                 -->
  <!-- H₂N–C(=O)–CH=CH₂                                                 -->
  <!-- ================================================================ -->
  <text x="130" y="420" class="name" text-anchor="middle">Acrylamide</text>
  <text x="42"  y="448" class="atom">H₂N</text>
  <line x1="68"  y1="444" x2="84"  y2="444" class="bond"/>
  <text x="84"  y="448" class="atom">C</text>
  <!-- C=O amide pendant -->
  <line x1="90" y1="449" x2="90" y2="461" class="dbl"/>
  <line x1="93" y1="449" x2="93" y2="461" class="dbl"/>
  <text x="86"  y="471" class="atom">O</text>
  <line x1="98"  y1="444" x2="114" y2="444" class="bond"/>
  <text x="114" y="448" class="atom">CH</text>
  <!-- CH=CH₂ double bond -->
  <line x1="129" y1="441" x2="145" y2="441" class="dbl"/>
  <line x1="129" y1="445" x2="145" y2="445" class="dbl"/>
  <text x="145" y="448" class="atom">CH₂</text>

</svg>
